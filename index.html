<script>
// ═══════════════════════════════════════════
//  SUPABASE — persistence primaire (serveur)
// ═══════════════════════════════════════════
var SB_URL="";
var SB_KEY="";
var SB_ID="";
var syncStatus="idle"; // idle | loading | ok | err

async function sbSave(d){
  try{
    syncStatus="loading";
    await fetch(SB_URL+"/rest/v1/progress",{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"resolution=merge-duplicates"},
      body:JSON.stringify({id:SB_ID,data:d,updated_at:new Date().toISOString()})
    });
    syncStatus="ok";
  }catch(e){syncStatus="err";}
}
async function sbLoad(){
  try{
    var r=await fetch(SB_URL+"/rest/v1/progress?id=eq."+SB_ID+"&select=data",{
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}
    });
    var rows=await r.json();
    if(rows&&rows.length>0)return rows[0].data;
  }catch(e){}
  return null;
}

// save : Supabase en premier, localStorage en backup
async function save(){
  var d={P:P,EX:EX,CC:CC,K:apiKey,ST:STATS};
  try{localStorage.setItem("yuki_"+(SB_ID||"local"),JSON.stringify(d));}catch(e){}
  if(SB_URL&&SB_KEY&&SB_ID)await sbSave(d);
}

// load : Supabase en premier, localStorage en fallback
async function load(){
  // Charger les credentials depuis localStorage
  try{
    var creds=localStorage.getItem("yuki_creds");
    if(creds){
      var c=JSON.parse(creds);
      if(c.url)SB_URL=c.url;
      if(c.key)SB_KEY=c.key;
      if(c.id)SB_ID=c.id;
    }
  }catch(e){}

  if(!SB_URL||!SB_KEY||!SB_ID){syncStatus="setup";return;}

  syncStatus="loading";
  var d=await sbLoad();
  if(!d){
    syncStatus="err";
    try{var s=localStorage.getItem("yuki_"+SB_ID);if(s)d=JSON.parse(s);}catch(e){}
  } else {
    syncStatus="ok";
  }
  if(d){
    if(d.P)P=d.P;
    if(d.EX)EX=d.EX;
    if(d.CC)CC=d.CC;
    if(d.K)apiKey=d.K;
    if(d.ST)STATS=d.ST;
  }
}

function b64d(s){return JSON.parse(decodeURIComponent(escape(atob(s))));}

function allCards(){
  initData();
  var v=VOCAB.map(function(d,i){return{id:"v"+i,mot:d[0],tr:d[1],cat:d[2],defLv:d[3],rd:""};});

//  SRS — SYSTÈME DE RÉPÉTITION ESPACÉE (CORRIGÉ)
// ═══════════════════════════════════════════
function getLv(c){return P[c.id]!==undefined?P[c.id].lv:c.defLv;}
function getNR(c){return P[c.id]?P[c.id].nr:0;}
function isDue(c){
  var p=P[c.id];
  if(!p)return c.defLv<3; // nouvelles cartes avec defLv<3 sont dues d'emblée
  return Date.now()>=p.nr;
}
function getDue(cats,lvF){
  return allCards().filter(function(c){
    var lv=getLv(c),ok=!cats.length||cats.indexOf(c.cat)>=0;
    if(lvF==="green") return ok&&lv===4;
    if(lvF==="blue")  return ok&&lv===3;
    if(lvF==="orange")return ok&&lv===2;
    if(lvF==="red")   return ok&&lv===0;
    if(lvF==="yellow")return ok&&lv===1;
    if(lvF==="all")   return ok;
    // Normal : toutes les cartes dues (y compris lv4 après 7j)
    return ok&&isDue(c);
  });
}

// BUG CORRIGÉ : cap à 4 (pas 3) — lv4 = révision à 7 jours
async function updLv(id,good){
  var cur=P[id]?P[id].lv:0;
  var nl=good?Math.min(cur+1,4):Math.max(cur-1,0);
  P[id]={lv:nl,nr:Date.now()+IVL[nl]};
  var today=new Date().toISOString().slice(0,10);
  if(!STATS[today])STATS[today]={reviewed:0,correct:0};
  STATS[today].reviewed++;
  if(good)STATS[today].correct++;
  await save();
}

function norm(s){return s.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[\u2019']/g,"'");}
function chkFR(a,b){var n=norm(a);return norm(b)===n||b.split("/").map(function(x){return norm(x.trim());}).some(function(x){return x===n;});}
function notify(m){var n=document.getElementById("nt");n.textContent=m;n.classList.add("show");setTimeout(function(){n.classList.remove("show");},2200);}
function pct(n,t){return t?Math.round(n/t*100):0;}

function go(v){
  view=v;det=null;editId=null;flipDone=false;wInp="";wRes=null;modalVisible=false;
  document.querySelectorAll(".navbtn").forEach(function(b){b.classList.toggle("a",b.dataset.v===v);});
  render();
}

function el(tag,attr,ch){
  var e=document.createElement(tag);
  for(var k in attr){
    if(k==="class")e.className=attr[k];
    else if(k.startsWith("on"))e.addEventListener(k.slice(2),attr[k]);
    else e.setAttribute(k,attr[k]);
  }
  if(typeof ch==="string")e.innerHTML=ch;
  else if(ch)ch.forEach(function(c){if(c)e.appendChild(c);});
  return e;
}
function div(attr,ch){return el("div",attr,ch);}
function btn(cls,text,cb){return el("button",{"class":"btn "+cls,"onclick":cb},text);}
function span(cls,text){return el("span",{"class":cls},text);}

function doSaveMC(){
  if(!mf.mot||!mf.tr){notify("Mot et traduction requis !");return;}
  var id=editId||("e"+Date.now());
  if(editId){
    // Check if it's a built-in card (vocab v* or kanji k*)
    var isBuiltin=id.startsWith("v")||id.startsWith("k");
    if(isBuiltin){
      // Store overrides in CC
      if(!CC[id])CC[id]={};
      CC[id].mot=mf.mot;
      CC[id].tr=mf.tr;
      CC[id].rd=mf.rd;
      CC[id].pj=mf.pj;CC[id].pf=mf.pf;CC[id].gr=mf.gr;CC[id].as=mf.as;
    } else {
      EX=EX.map(function(c){return c.id===editId?Object.assign({},c,{mot:mf.mot,tr:mf.tr,rd:mf.rd,cat:mf.cat}):c;});
      CC[id]={pj:mf.pj,pf:mf.pf,gr:mf.gr,as:mf.as};
    }
  } else {
    EX.push({id:id,mot:mf.mot,tr:mf.tr,rd:mf.rd||"",cat:mf.cat||"Vocabulaire",defLv:0});
    CC[id]={pj:mf.pj,pf:mf.pf,gr:mf.gr,as:mf.as};
  }
  save();notify(editId?"Modifié ✓":"Ajouté ✓");
  editId=null;mf={mot:"",tr:"",rd:"",cat:"Vocabulaire",pj:"",pf:"",gr:"",as:""};go("library");
}


function renderStats(){
  var cards=allCards();
  var total=cards.length;
  var byLv=[0,1,2,3,4].map(function(l){return cards.filter(function(c){return getLv(c)===l;}).length;});
  var known=byLv[4];
  var pctKnown=Math.round(known/total*100);

  // Streak
  var today=new Date().toISOString().slice(0,10);
  var streak=0;
  var d=new Date();
  while(true){
    var ds=d.toISOString().slice(0,10);
    if(STATS[ds]&&STATS[ds].reviewed>0){streak++;d.setDate(d.getDate()-1);}
    else break;
  }

  // Last 7 days data
  var days=[];
  for(var i=6;i>=0;i--){
    var dd=new Date();dd.setDate(dd.getDate()-i);
    var ds2=dd.toISOString().slice(0,10);
    var label=dd.toLocaleDateString("fr-FR",{weekday:"short"});
    var st=STATS[ds2]||{reviewed:0,correct:0};
    days.push({label:label,reviewed:st.reviewed,correct:st.correct});
  }
  var maxReviewed=Math.max.apply(null,days.map(function(d){return d.reviewed;}));
  if(maxReviewed===0)maxReviewed=1;

  // Today stats
  var todaySt=STATS[today]||{reviewed:0,correct:0};
  var todayPct=todaySt.reviewed>0?Math.round(todaySt.correct/todaySt.reviewed*100):0;

  // Estimate days to N5 (need ~80% = 692 cards)
  var target=Math.round(total*0.8);
  var remaining=Math.max(0,target-known);
  var avgPerDay=0;
  var daysWithData=Object.values(STATS).filter(function(s){return s.reviewed>0;});

function render(){
  var app=document.getElementById("app");
  if(!app)return;
  while(app.firstChild)app.removeChild(app.firstChild);
  try{
    var content;
    if(view==="login")content=renderLogin();
    else if(view==="home")content=renderHome();
    else if(view==="setup")content=renderSetup();
    else if(view==="session")content=renderSession();
    else if(view==="library")content=renderLibrary();
    else if(view==="kanji")content=renderKanji();
    else if(view==="stats")content=renderStats();
    else if(view==="grammar")content=renderGrammar();
    else if(view==="grammar-session")content=renderGrammarSession();
    else if(view==="sb-setup")content=renderSupabaseSetup();
    else if(view==="edit")content=renderEdit();
    else content=renderAdd();
    app.appendChild(content);
  }catch(e){
    var err=document.createElement("div");
    err.style.cssText="padding:20px;color:red;font-size:13px;word-break:break-all";
    err.textContent="Erreur: "+e.message+" ("+e.stack.split("\n")[1]+")";
    app.appendChild(err);
  }
}

var grSess=null,grQ=[],grIdx=0,grInp="",grRes=null,grScore=0,grTotal=0;

function startGrammar(sess){
  grSess=sess;
  grQ=sess.ex.slice().sort(function(){return Math.random()-.5;}).slice(0,Math.min(30,sess.ex.length));
  grIdx=0;grScore=0;grTotal=grQ.length;grInp="";grRes=null;
  view="grammar-session";
  document.querySelectorAll(".navbtn").forEach(function(b){b.classList.remove("a");});
  render();
}

function grCheckAnswer(ex,inp){
  var a=inp.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  var correct=ex.a.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  // Accept avec/sans espace autour de /
  return a===correct||a.replace(/\s*\/\s*/g,"/")=== correct.replace(/\s*\/\s*/g,"/");
}

  if(ex.t==="b"||ex.t==="c"){

// ═══════════════════════════════════════════
//  STATS — GRAPHE 30 JOURS
// ═══════════════════════════════════════════
function render30DayGraph(){
  var days=[];
  for(var i=29;i>=0;i--){
    var dd=new Date();dd.setDate(dd.getDate()-i);
    var ds=dd.toISOString().slice(0,10);
    var st=STATS[ds]||{reviewed:0,correct:0};
    var lbl=i===0?"auj":i===1?"hier":dd.toLocaleDateString("fr-FR",{day:"numeric",month:"short"}).replace(" ","");
    days.push({ds:ds,reviewed:st.reviewed,correct:st.correct,lbl:lbl,idx:29-i});
  }
  var maxR=Math.max.apply(null,days.map(function(d){return d.reviewed;}));
  if(maxR===0)maxR=1;

  var W=440,H=130,PAD_L=32,PAD_R=10,PAD_T=16,PAD_B=24;
  var W2=W-PAD_L-PAD_R,H2=H-PAD_T-PAD_B;
  var xStep=W2/29;

  function xOf(i){return PAD_L+i*xStep;}
  function yOf(v){return PAD_T+H2-(v/maxR)*H2;}

  // Build polyline points for "reviewed"
  var pts=days.map(function(d,i){return xOf(i).toFixed(1)+","+yOf(d.reviewed).toFixed(1);}).join(" ");
  var ptsArea=pts+" "+xOf(29).toFixed(1)+","+(PAD_T+H2).toFixed(1)+" "+xOf(0).toFixed(1)+","+(PAD_T+H2).toFixed(1);

  // SVG container
  var container=div({},null);
  container.style.cssText="margin:0 12px 12px;background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.08)";

  var title=div({},null);title.textContent="Cartes révisées — 30 derniers jours";
  title.style.cssText="font-size:12px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px";

  var svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox","0 0 "+W+" "+H);
  svg.setAttribute("width","100%");
  svg.style.overflow="visible";

  // Y axis grid lines
  [0.25,0.5,0.75,1].forEach(function(ratio){
    var y=yOf(maxR*ratio);
    var line=document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1",PAD_L);line.setAttribute("x2",W-PAD_R);
    line.setAttribute("y1",y);line.setAttribute("y2",y);
    line.setAttribute("stroke","#f0f0f0");line.setAttribute("stroke-width","1");
    svg.appendChild(line);
    var lbl=document.createElementNS("http://www.w3.org/2000/svg","text");
    lbl.setAttribute("x",PAD_L-4);lbl.setAttribute("y",y+4);
    lbl.setAttribute("text-anchor","end");lbl.setAttribute("font-size","9");
    lbl.setAttribute("fill","#ccc");lbl.textContent=Math.round(maxR*ratio);
    svg.appendChild(lbl);
  });

  // Area fill
  var area=document.createElementNS("http://www.w3.org/2000/svg","polygon");
  area.setAttribute("points",ptsArea);
  area.setAttribute("fill","rgba(225,29,72,0.08)");
  svg.appendChild(area);

  // Line
  var polyline=document.createElementNS("http://www.w3.org/2000/svg","polyline");
  polyline.setAttribute("points",pts);
  polyline.setAttribute("fill","none");polyline.setAttribute("stroke","#e11d48");
  polyline.setAttribute("stroke-width","2");polyline.setAttribute("stroke-linejoin","round");
  polyline.setAttribute("stroke-linecap","round");
  svg.appendChild(polyline);

  // Dots for each day with data, X labels for every 7 days
  days.forEach(function(d,i){
    if(d.reviewed>0){
      var circle=document.createElementNS("http://www.w3.org/2000/svg","circle");
      circle.setAttribute("cx",xOf(i));circle.setAttribute("cy",yOf(d.reviewed));
      circle.setAttribute("r","3");circle.setAttribute("fill","#e11d48");
      svg.appendChild(circle);
    }
    // Labels every 7 days + today
    if(i===0||i===6||i===13||i===20||i===29){
      var lbl2=document.createElementNS("http://www.w3.org/2000/svg","text");
      lbl2.setAttribute("x",xOf(i));lbl2.setAttribute("y",H-4);
      lbl2.setAttribute("text-anchor","middle");lbl2.setAttribute("font-size","9");
      lbl2.setAttribute("fill",i===29?"#e11d48":"#bbb");
      if(i===29)lbl2.setAttribute("font-weight","700");
      lbl2.textContent=d.lbl;
      svg.appendChild(lbl2);
    }
  });

  container.appendChild(title);
  container.appendChild(svg);

  // Summary row
  var totalReviewed=days.reduce(function(s,d){return s+d.reviewed;},0);
  var totalCorrect=days.reduce(function(s,d){return s+d.correct;},0);
  var accuracy=totalReviewed>0?Math.round(totalCorrect/totalReviewed*100):0;
  var activeDays=days.filter(function(d){return d.reviewed>0;}).length;

  var summaryRow=div({},null);summaryRow.style.cssText="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px;text-align:center";
  [{v:totalReviewed,l:"Révisées"},{v:accuracy+"%",l:"Précision"},{v:activeDays+"j",l:"Jours actifs"}].forEach(function(s){
    var box=div({},null);box.style.cssText="background:#f9fafb;border-radius:8px;padding:6px 4px";
    var val=div({},null);val.textContent=s.v;val.style.cssText="font-size:20px;font-weight:800;color:#e11d48";
    var lbl=div({},null);lbl.textContent=s.l;lbl.style.cssText="font-size:10px;color:#aaa;margin-top:1px";
    box.appendChild(val);box.appendChild(lbl);summaryRow.appendChild(box);
  });
  container.appendChild(summaryRow);
  return container;
}

    loginBtn.textContent="⏳ Connexion...";loginBtn.disabled=true;
    SB_URL=url.replace(/\/+$/,"");SB_KEY=key;SB_ID=id;
    try{localStorage.setItem("yuki_creds",JSON.stringify({url:SB_URL,key:SB_KEY,id:SB_ID}));}catch(e){}
    syncStatus="loading";
    var d=await sbLoad();
    if(d){
      syncStatus="ok";
      if(d.P)P=d.P;if(d.EX)EX=d.EX;if(d.CC)CC=d.CC;if(d.K)apiKey=d.K;if(d.ST)STATS=d.ST;
      go("home");
    } else {
      // Nouveau compte — on crée les données vides
      syncStatus="ok";
      await save();
      go("home");
    }
  });
  loginBtn.style.marginBottom="0";
  card.appendChild(loginBtn);
  wrap.appendChild(card);

  var help=div({},null);
  help.innerHTML="Pas encore de projet ? <a href='https://supabase.com' style='color:#e11d48;font-weight:600'>supabase.com</a> est gratuit";
  help.style.cssText="text-align:center;font-size:12px;color:#aaa;margin-top:16px";
  wrap.appendChild(help);
  return wrap;
}

// ═══════════════════════════════════════════
//  TTS — SYNTHÈSE VOCALE JAPONAISE
// ═══════════════════════════════════════════
var ttsVoice=null,ttsReady=false,ttsAutoplay=true;

function initTTS(){
  if(!window.speechSynthesis)return;
  function pickVoice(){
    var voices=speechSynthesis.getVoices();
    // Priorité : voix japonaise native
    ttsVoice=voices.find(function(v){return v.lang==="ja-JP"&&v.localService;})
      ||voices.find(function(v){return v.lang==="ja-JP";})
      ||voices.find(function(v){return v.lang.startsWith("ja");})
      ||null;
    ttsReady=!!ttsVoice;
  }
  pickVoice();
  if(!ttsReady)speechSynthesis.addEventListener("voiceschanged",function(){pickVoice();});
}

function speak(text,onEnd){
  if(!window.speechSynthesis||!text)return;
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  u.rate=0.85;
  u.pitch=1.05;
  if(ttsVoice)u.voice=ttsVoice;
  if(onEnd)u.onend=onEnd;
  speechSynthesis.speak(u);
}

// Bouton audio réutilisable
function mkSpeakBtn(text,big){
  var b=el("button",{},"🔊");
  b.title="Écouter la prononciation";
  var sz=big?"32px":"22px";
  b.style.cssText="border:none;background:none;cursor:pointer;font-size:"+sz+";padding:2px 6px;opacity:.6;transition:opacity .15s;flex-shrink:0";
  b.addEventListener("mouseenter",function(){this.style.opacity="1";});
  b.addEventListener("mouseleave",function(){this.style.opacity=".6";});
  b.addEventListener("click",function(e){
    e.stopPropagation();
    this.textContent="🔊";
    speak(text,null);
  });
  return b;
}

initTTS();

// Lignes hiragana : [affichage, valeur à insérer]
var KANA_ROWS = [
  ["あ","い","う","え","お"],
  ["か","き","く","け","こ"],
  ["さ","し","す","せ","そ"],
  ["た","ち","つ","て","と"],
  ["な","に","ぬ","ね","の"],
  ["は","ひ","ふ","へ","ほ"],
  ["ま","み","む","め","も"],
  ["や","　","ゆ","　","よ"],
  ["ら","り","る","れ","ろ"],
  ["わ","を","ん","ー","っ"],
  ["が","ぎ","ぐ","げ","ご"],
  ["ざ","じ","ず","ぜ","ぞ"],
  ["だ","ぢ","づ","で","ど"],
  ["ば","び","ぶ","べ","ぼ"],
  ["ぱ","ぴ","ぷ","ぺ","ぽ"],
  ["ぁ","ぃ","ぅ","ぇ","ぉ"],
  ["ゃ","　","ゅ","　","ょ"]
];

// Katakana equivalents (show toggle)
var KANA_KATA = [
  ["ア","イ","ウ","エ","オ"],
  ["カ","キ","ク","ケ","コ"],
  ["サ","シ","ス","セ","ソ"],
  ["タ","チ","ツ","テ","ト"],
  ["ナ","ニ","ヌ","ネ","ノ"],
  ["ハ","ヒ","フ","ヘ","ホ"],
  ["マ","ミ","ム","メ","モ"],
  ["ヤ","　","ユ","　","ヨ"],
  ["ラ","リ","ル","レ","ロ"],
  ["ワ","ヲ","ン","ー","ッ"],
  ["ガ","ギ","グ","ゲ","ゴ"],
  ["ザ","ジ","ズ","ゼ","ゾ"],
  ["ダ","ヂ","ヅ","デ","ド"],
  ["バ","ビ","ブ","ベ","ボ"],
  ["パ","ピ","プ","ペ","ポ"],
  ["ァ","ィ","ゥ","ェ","ォ"],
  ["ャ","　","ュ","　","ョ"]
];

var kanaMode = "hira"; // "hira" | "kata"

function mkKanaKeyboard(inputId, onUpdate) {
  var wrap = div({}, null);
  wrap.style.cssText = "background:#f9f9f9;border:1.5px solid #e8e8e8;border-radius:14px;padding:10px 8px 6px;margin-top:6px;user-select:none";

  // Toggle hira/kata + backspace row
  var topRow = div({}, null);
  topRow.style.cssText = "display:flex;gap:6px;margin-bottom:8px;align-items:center";

  var hiraBtn = el("button", {}, "ひ");
  hiraBtn.style.cssText = "flex:1;padding:8px 4px;border-radius:8px;border:1.5px solid "+(kanaMode==="hira"?"#e11d48":"#ddd")+";background:"+(kanaMode==="hira"?"#fff1f2":"#fff")+";color:"+(kanaMode==="hira"?"#e11d48":"#666")+";font-size:16px;font-weight:700;cursor:pointer;font-family:inherit";
  hiraBtn.addEventListener("click", function(e) {
    e.stopPropagation(); kanaMode = "hira";
    var kb = document.getElementById("kana-kb");
    if (kb) kb.parentNode.replaceChild(mkKanaKeyboard(inputId, onUpdate), kb);
  });

  var kataBtn = el("button", {}, "カ");
  kataBtn.style.cssText = "flex:1;padding:8px 4px;border-radius:8px;border:1.5px solid "+(kanaMode==="kata"?"#e11d48":"#ddd")+";background:"+(kanaMode==="kata"?"#fff1f2":"#fff")+";color:"+(kanaMode==="kata"?"#e11d48":"#666")+";font-size:16px;font-weight:700;cursor:pointer;font-family:inherit";
  kataBtn.addEventListener("click", function(e) {
    e.stopPropagation(); kanaMode = "kata";
    var kb = document.getElementById("kana-kb");
    if (kb) kb.parentNode.replaceChild(mkKanaKeyboard(inputId, onUpdate), kb);
  });

  var bksp = el("button", {}, "⌫");
  bksp.style.cssText = "flex:1.5;padding:8px 4px;border-radius:8px;border:1.5px solid #ddd;background:#fff;color:#333;font-size:18px;cursor:pointer;font-family:inherit";
  bksp.addEventListener("click", function(e) {
    e.stopPropagation();
    wInp = wInp.slice(0, -1);
    var inp = document.getElementById(inputId);
    if (inp) { inp.value = wInp; inp.focus(); }
    onUpdate(wInp);
  });

  var clr = el("button", {}, "✕");
  clr.style.cssText = "flex:1;padding:8px 4px;border-radius:8px;border:1.5px solid #ddd;background:#fff;color:#999;font-size:14px;cursor:pointer;font-family:inherit";
  clr.addEventListener("click", function(e) {
    e.stopPropagation();
    wInp = "";
    var inp = document.getElementById(inputId);
    if (inp) { inp.value = ""; inp.focus(); }
    onUpdate(wInp);
  });

  topRow.appendChild(hiraBtn); topRow.appendChild(kataBtn);
  topRow.appendChild(bksp); topRow.appendChild(clr);
  wrap.appendChild(topRow);

  // Kana grid — 5 columns, all rows
  var grid = div({}, null);
  grid.style.cssText = "display:grid;grid-template-columns:repeat(5,1fr);gap:4px";
  var rows = kanaMode === "hira" ? KANA_ROWS : KANA_KATA;
  rows.forEach(function(row) {
    row.forEach(function(ch) {
      var b = el("button", {}, ch === "　" ? "" : ch);
      b.style.cssText = "padding:9px 2px;border-radius:7px;border:1px solid #e0e0e0;background:"+(ch==="　"?"#f0f0f0":"#fff")+";font-size:16px;cursor:"+(ch==="　"?"default":"pointer")+";font-family:inherit;transition:background .1s;color:#1a1a1a";
      if (ch !== "　") {
        b.addEventListener("click", function(e) {
          e.stopPropagation();
          wInp += ch;
          var inp = document.getElementById(inputId);
          if (inp) { inp.value = wInp; inp.focus(); }
          onUpdate(wInp);
          // Haptic if available
          if (navigator.vibrate) navigator.vibrate(8);
          this.style.background = "#fff1f2";
          var self = this;
          setTimeout(function(){ self.style.background = "#fff"; }, 100);
        });
      }
      grid.appendChild(b);
    });
  });
  wrap.id = "kana-kb";
  wrap.appendChild(grid);
  return wrap;
}

</script>
